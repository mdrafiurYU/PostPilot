name: CI/CD — Cloud Build + Cloud Run

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (leave empty to deploy all)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Install Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: "beta"

      - name: Verify authentication
        shell: bash
        run: |
          set -euo pipefail

          echo "Authenticated account:"
          gcloud auth list

          echo "Current project:"
          gcloud config get-value project

          gcloud projects describe "${{ secrets.GCP_PROJECT_ID }}"

      - name: Build and push images (Cloud Build)
        shell: bash
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
        run: |
          set -euo pipefail

          gcloud builds submit \
            --config cloudbuild.yaml \
            --substitutions=_GCP_REGION=${GCP_REGION},_ARTIFACT_REPO=${ARTIFACT_REPO},_IMAGE_TAG=${GITHUB_SHA}

      - name: Make deploy script executable
        run: chmod +x ./scripts/deploy-gcp.sh

      - name: Dry-run deployment
        shell: bash
        env:
          IMAGE_TAG: latest
          VPC_CONNECTOR: ${{ secrets.VPC_CONNECTOR }}
          CLOUDSQL_INSTANCES: ${{ secrets.CLOUDSQL_INSTANCES }}
        run: |
          set -euo pipefail

          echo "Checking deploy script syntax..."
          bash -n ./scripts/deploy-gcp.sh

          FLAGS=()

          if [[ -n "${VPC_CONNECTOR}" ]]; then
            FLAGS+=(--vpc-connector "${VPC_CONNECTOR}")
          fi

          if [[ -n "${CLOUDSQL_INSTANCES}" ]]; then
            FLAGS+=(--add-cloudsql-instances "${CLOUDSQL_INSTANCES}")
          fi

          echo "Flags: ${FLAGS[*]}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.service }}" ]]; then
            echo "SERVICE=${{ github.event.inputs.service }} IMAGE_TAG=${IMAGE_TAG} ./scripts/deploy-gcp.sh ${FLAGS[*]}"
          else
            echo "IMAGE_TAG=${IMAGE_TAG} ./scripts/deploy-gcp.sh ${FLAGS[*]}"
          fi

      - name: Deploy to Cloud Run
        shell: bash
        env:
          CLOUD_RUN_SA: postpilot-cloud-run@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
          IMAGE_TAG: latest

          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

          VPC_CONNECTOR: ${{ secrets.VPC_CONNECTOR }}
          CLOUDSQL_INSTANCES: ${{ secrets.CLOUDSQL_INSTANCES }}

        run: |
          set -euo pipefail

          FLAGS=()

          if [[ -n "${VPC_CONNECTOR}" ]]; then
            FLAGS+=(--vpc-connector "${VPC_CONNECTOR}")
          fi

          if [[ -n "${CLOUDSQL_INSTANCES}" ]]; then
            FLAGS+=(--add-cloudsql-instances "${CLOUDSQL_INSTANCES}")
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.service }}" ]]; then
            SERVICE="${{ github.event.inputs.service }}"
            echo "Deploying service: ${SERVICE}"
            SERVICE="${SERVICE}" IMAGE_TAG="${IMAGE_TAG}" ./scripts/deploy-gcp.sh "${FLAGS[@]}"
          else
            echo "Deploying all services"
            IMAGE_TAG="${IMAGE_TAG}" ./scripts/deploy-gcp.sh "${FLAGS[@]}"
          fi
